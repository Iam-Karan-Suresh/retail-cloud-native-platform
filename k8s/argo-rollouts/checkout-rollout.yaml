apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: checkout
  namespace: retail-store
  labels:
    app.kubernetes.io/name: checkout
    app.kubernetes.io/part-of: retail-store
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: checkout
  strategy:
    canary:
      canaryService: checkout-canary
      stableService: checkout-stable
      # Progressive traffic shifting
      steps:
        - setWeight: 20
        - pause: { duration: 60s }
        - analysis:
            templates:
              - templateName: canary-analysis
            args:
              - name: service-name
                value: checkout
        - setWeight: 40
        - pause: { duration: 60s }
        - analysis:
            templates:
              - templateName: canary-analysis
            args:
              - name: service-name
                value: checkout
        - setWeight: 80
        - pause: { duration: 60s }
        - analysis:
            templates:
              - templateName: canary-analysis
            args:
              - name: service-name
                value: checkout
        # Final promotion happens automatically after all steps pass
      # Anti-affinity for canary replicas
      antiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          weight: 100
      # Automatic rollback on degradation
      dynamicStableScale: true
      abortScaleDownDelaySeconds: 30
  template:
    metadata:
      labels:
        app.kubernetes.io/name: checkout
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: checkout
      securityContext:
        fsGroup: 1000
      containers:
        - name: checkout
          image: public.ecr.aws/aws-containers/retail-store-sample-checkout:1.2.2
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: OTEL_SERVICE_NAME
              value: checkout
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_PROPAGATORS
              value: tracecontext,baggage
            - name: OTEL_TRACES_SAMPLER
              value: always_on
            - name: RETAIL_CHECKOUT_PERSISTENCE_PROVIDER
              value: redis
            - name: RETAIL_CHECKOUT_PERSISTENCE_REDIS_URL
              value: redis://checkout-redis:6379
            - name: RETAIL_CHECKOUT_ENDPOINTS_ORDERS
              value: http://orders:80
          resources:
            requests:
              cpu: 128m
              memory: 256Mi
            limits:
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
      nodeSelector:
        role: spot-worker
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node.kubernetes.io/lifecycle
                    operator: In
                    values: ["spot"]
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: checkout
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-stable
  namespace: retail-store
spec:
  selector:
    app.kubernetes.io/name: checkout
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-canary
  namespace: retail-store
spec:
  selector:
    app.kubernetes.io/name: checkout
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP

# =============================================================================
# LOCAL VALUES OVERRIDE — Checkout Service
# =============================================================================
# Strips AWS-specific scheduling, reduces resources for Kind.
#
# Usage: helm install ... -f values.yaml -f local/values/checkout-local.yaml
# =============================================================================

replicaCount: 1

image:
  repository: ghcr.io/iam-karan-suresh/retail-store-sample-checkout
  pullPolicy: IfNotPresent
  tag: '1.3.0'

# Remove AWS scheduling
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

# Reduced resources
resources:
  limits:
    memory: 192Mi
  requests:
    cpu: 64m
    memory: 128Mi

# Disable PDB
podDisruptionBudget:
  enabled: false

# Checkout uses in-memory by default
app:
  persistence:
    provider: 'in-memory'

# Redis — not created by default locally
redis:
  create: false
  nodeSelector: {}
  tolerations: []

# Disable security groups (AWS-only)
securityGroups:
  create: false

# Disable OpenTelemetry
opentelemetry:
  enabled: false

autoscaling:
  enabled: false

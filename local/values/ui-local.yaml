# =============================================================================
# LOCAL VALUES OVERRIDE — UI Service
# =============================================================================
# Strips all AWS-specific scheduling (nodeSelector, topology spread, PDB)
# and reduces resource requests for local Kind deployment.
#
# Usage: helm install ... -f values.yaml -f local/values/ui-local.yaml
# =============================================================================

# Single replica for local development
replicaCount: 1

image:
  # Use GHCR images (or override with GitLab registry in CI)
  repository: ghcr.io/iam-karan-suresh/retail-store-sample-ui
  pullPolicy: IfNotPresent
  tag: '1.3.0'

# ---------------------------------------------------------------------------
# REMOVE AWS SCHEDULING — no spot nodes, no taints in Kind
# ---------------------------------------------------------------------------
nodeSelector: {}

tolerations: []

affinity: {}

topologySpreadConstraints: []

# ---------------------------------------------------------------------------
# REDUCED RESOURCES — local development doesn't need production sizing
# ---------------------------------------------------------------------------
resources:
  limits:
    memory: 384Mi
  requests:
    cpu: 64m
    memory: 256Mi

# ---------------------------------------------------------------------------
# DISABLE PDB — not useful with 1 replica
# ---------------------------------------------------------------------------
podDisruptionBudget:
  enabled: false

# ---------------------------------------------------------------------------
# GATEWAY API — Traefik (same as production, minus TLS/cert-manager)
# ---------------------------------------------------------------------------
gatewayAPI:
  enabled: true
  gatewayClassName: 'traefik'
  hostname: ''
  requestTimeout: '600s'
  requestBodySize: true
  maxRequestBodyBytes: 8388608
  httpToHttpsRedirect: false
  tls:
    enabled: false
    hostname: ''
    secretName: 'tls-secret'
  certManager:
    enabled: false

# Disable cert-manager cluster issuer (no Let's Encrypt locally)
certManager:
  createClusterIssuer: false

# Disable OpenTelemetry by default for local (no collector running)
opentelemetry:
  enabled: false

# Metrics — keep enabled for local Prometheus
metrics:
  enabled: true
  podAnnotations:
    prometheus.io/scrape: 'true'
    prometheus.io/port: '8080'
    prometheus.io/path: '/actuator/prometheus'

# Autoscaling — disabled
autoscaling:
  enabled: false

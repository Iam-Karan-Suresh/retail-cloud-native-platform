# =============================================================================
# LOCAL VALUES OVERRIDE — Orders Service
# =============================================================================
# Strips AWS-specific scheduling, reduces resources for Kind.
# KEDA is disabled by default for local (no RabbitMQ to scale against).
# Enable KEDA if you deploy with --stateful and want autoscaling.
#
# Usage: helm install ... -f values.yaml -f local/values/orders-local.yaml
# =============================================================================

replicaCount: 1

image:
  repository: ghcr.io/iam-karan-suresh/retail-store-sample-orders
  pullPolicy: IfNotPresent
  tag: '1.3.0'

# Remove AWS scheduling
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

# Reduced resources
resources:
  limits:
    memory: 384Mi
  requests:
    cpu: 64m
    memory: 256Mi

# Disable PDB
podDisruptionBudget:
  enabled: false

# Disable KEDA locally (no RabbitMQ in-memory mode)
keda:
  enabled: false

# Orders uses in-memory by default
app:
  persistence:
    provider: 'in-memory'
  messaging:
    provider: 'in-memory'

# PostgreSQL — not created by default locally
postgresql:
  create: false
  nodeSelector: {}
  tolerations: []

# RabbitMQ — not created by default locally
rabbitmq:
  create: false
  nodeSelector: {}
  tolerations: []

# Disable security groups (AWS-only)
securityGroups:
  create: false

# Disable OpenTelemetry
opentelemetry:
  enabled: false

# Disable legacy HPA
autoscaling:
  enabled: false

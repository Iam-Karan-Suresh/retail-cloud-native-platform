# =============================================================================
# KIND CLUSTER CONFIGURATION — Local Development
# =============================================================================
# Multi-node Kind cluster simulating a production-like environment.
# 1 control-plane + 2 workers for realistic pod scheduling.
#
# Port mappings expose Traefik on host ports 80/443.
# =============================================================================
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: retail-store-local

nodes:
  # -------------------------------------------------------------------------
  # CONTROL PLANE
  # -------------------------------------------------------------------------
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Traefik HTTP
      - containerPort: 30080
        hostPort: 80
        protocol: TCP
      # Traefik HTTPS
      - containerPort: 30443
        hostPort: 443
        protocol: TCP

  # -------------------------------------------------------------------------
  # WORKER NODE 1
  # -------------------------------------------------------------------------
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "role=worker"

  # -------------------------------------------------------------------------
  # WORKER NODE 2
  # -------------------------------------------------------------------------
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "role=worker"

# ---------------------------------------------------------------------------
# NETWORKING
# ---------------------------------------------------------------------------
networking:
  # Use the default Kind CNI (kindnet)
  disableDefaultCNI: false
  # Pod subnet
  podSubnet: "10.244.0.0/16"
  # Service subnet
  serviceSubnet: "10.96.0.0/12"

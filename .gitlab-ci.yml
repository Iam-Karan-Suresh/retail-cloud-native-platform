#
# =============================================================================
#  RETAIL CLOUD NATIVE PLATFORM вҖ” Production-Grade GitLab CI/CD Pipeline
# =============================================================================
#
#  Architecture: Polyglot Microservices (Java, Go, Node.js)
#  Services:     cart | catalog | checkout | orders | ui
#  Registry:     GitLab Container Registry (OCI)
#  Charts:       Helm v3 вҶ’ GitLab Helm Registry
#  CD:           Direct Helm Deploy (local Kind / on-prem K8s)
#  Security:     Gitleaks, SAST, Secret Detection, Dependency Scan,
#                Container Scan (Trivy), License Compliance, IaC Scan, DAST
#
#  Pipeline Flow:
#    preflight вҶ’ security вҶ’ lint вҶ’ test вҶ’ build вҶ’ scan вҶ’ publish-chart
#              вҶ’ deploy-staging вҶ’ integration-test вҶ’ deploy-production вҶ’ deploy-local вҶ’ notify
#
#  Author: Senior DevOps/CICD Engineer
#  Docs:   See .gitlab/ci/*.yml for detailed stage documentation
#
# =============================================================================

# ---------------------------------------------------------------------------
# PIPELINE STAGES вҖ” Ordered execution flow
# ---------------------------------------------------------------------------
# Each stage completes before the next begins (unless `needs:` overrides).
# Jobs within a stage run in parallel.
# ---------------------------------------------------------------------------
stages:
  - preflight          # Change detection, cache warming
  - security           # Gitleaks, SAST, Secret Detection, Dep Scan, IaC Scan
  - lint               # Hadolint, Helm lint, YAML lint, ShellCheck, Terraform
  - test               # Unit tests (Maven/Go/Jest), integration tests
  - build              # Kaniko Docker build вҶ’ GitLab Container Registry
  - scan               # Trivy container image scanning (post-build)
  - publish-chart      # Helm chart packaging, registry push
  - deploy-staging     # Staging/review-app deployment
  - integration-test   # Smoke tests, DAST against staging
  - deploy-production  # Manual gate вҶ’ direct Helm deploy
  - deploy-local       # Local Kind cluster deployment
  - notify             # Pipeline & deployment notifications

# ---------------------------------------------------------------------------
# GLOBAL VARIABLES
# ---------------------------------------------------------------------------
# These variables are available to ALL jobs in the pipeline.
# Service-specific variables are set in individual job definitions.
#
# вҡ пёҸ  SENSITIVE VARIABLES (secrets, tokens, keys) must be set in:
#     Settings вҶ’ CI/CD вҶ’ Variables (protected + masked)
# ---------------------------------------------------------------------------
variables:
  # --- Docker / Registry ---
  DOCKER_BUILDKIT: "1"
  DOCKER_TLS_CERTDIR: "/certs"

  # --- Git ---
  GIT_STRATEGY: fetch                        # Faster than clone for most jobs
  GIT_DEPTH: 20                              # Shallow clone (sufficient for MR diffs)
  GIT_SUBMODULE_STRATEGY: none

  # --- Pipeline Behavior ---
  FF_USE_FASTZIP: "true"                     # Faster artifact compression
  ARTIFACT_COMPRESSION_LEVEL: "fast"         # Balance speed vs size
  CACHE_COMPRESSION_LEVEL: "fast"
  TRANSFER_METER_FREQUENCY: "5s"             # Progress reporting for large uploads

  # --- Kubernetes Namespaces ---
  STAGING_NAMESPACE: retail-store-staging
  PRODUCTION_NAMESPACE: retail-store

  # --- Timeouts ---
  HELM_TIMEOUT: "5m"
  KUBECTL_TIMEOUT: "180s"

# ---------------------------------------------------------------------------
# GLOBAL DEFAULT SETTINGS
# ---------------------------------------------------------------------------
# Applied to all jobs unless overridden at job level.
# ---------------------------------------------------------------------------
default:
  # Retry transient infrastructure failures (not code failures)
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - scheduler_failure
      - api_failure

  # Global timeout вҖ” individual jobs can override
  timeout: 30m

  # Interruptible вҖ” auto-cancel pipelines for the same branch
  interruptible: true

# ---------------------------------------------------------------------------
# WORKFLOW RULES вҖ” When to create/skip pipelines
# ---------------------------------------------------------------------------
# Prevents duplicate pipelines (e.g., both MR + branch push).
# ---------------------------------------------------------------------------
workflow:
  rules:
    # Run on merge request events
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Run on default branch pushes
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    # Run on git tags (releases)
    - if: $CI_COMMIT_TAG
    # Run on manual triggers (web UI, API)
    - if: $CI_PIPELINE_SOURCE == "web"
    # Run on scheduled pipelines (nightly security scans, etc.)
    - if: $CI_PIPELINE_SOURCE == "schedule"
    # Skip branch pushes that also have an open MR (prevents duplicates)
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    # Allow other branch pushes
    - if: $CI_COMMIT_BRANCH

# ---------------------------------------------------------------------------
# INCLUDE вҖ” Modular Pipeline Definitions
# ---------------------------------------------------------------------------
# Each file handles one concern. This keeps the root file clean and
# makes it easy to find, debug, and modify specific pipeline stages.
# ---------------------------------------------------------------------------
include:
  # Reusable job templates (hidden jobs that other jobs extend)
  - local: .gitlab/ci/templates.yml

  # Security scanning (Gitleaks, SAST, Secret Detection, Dep Scan, IaC)
  - local: .gitlab/ci/security.yml

  # Code quality & linting (Hadolint, Helm, YAML, Shell, Terraform, ESLint)
  - local: .gitlab/ci/lint.yml

  # Unit & integration tests (Maven, Go, Jest)
  - local: .gitlab/ci/test.yml

  # Docker builds (Kaniko) + container scanning (Trivy)
  - local: .gitlab/ci/build.yml

  # Helm chart packaging, registry push, values.yaml update
  - local: .gitlab/ci/publish-chart.yml

  # Staging deployment + review apps + smoke tests + DAST
  - local: .gitlab/ci/deploy-staging.yml

  # Production deployment + verification + rollback
  - local: .gitlab/ci/deploy-production.yml

  # Local Kind cluster deployment
  - local: .gitlab/ci/deploy-local.yml

  # Pipeline & deployment notifications (Slack, Teams, webhooks)
  - local: .gitlab/ci/notifications.yml

  # GitLab-managed SAST template (auto-detects analyzers)
  - template: Security/SAST.gitlab-ci.yml

  # GitLab-managed Secret Detection template
  - template: Security/Secret-Detection.gitlab-ci.yml

# ---------------------------------------------------------------------------
# PREFLIGHT вҖ” Pipeline Initialization & Change Detection
# ---------------------------------------------------------------------------
# This job runs first to determine which services changed.
# Downstream jobs use `rules:changes` for per-service filtering.
# ---------------------------------------------------------------------------
preflight:
  stage: preflight
  image: alpine:3.22
  script:
    - |
      echo "в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—"
      echo "в•‘  RETAIL CLOUD NATIVE PLATFORM вҖ” CI/CD Pipeline             в•‘"
      echo "в• в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•Ј"
      echo "в•‘                                                            в•‘"
      echo "в•‘  Pipeline ID:    ${CI_PIPELINE_ID}                         в•‘"
      echo "в•‘  Source:         ${CI_PIPELINE_SOURCE}                     в•‘"
      echo "в•‘  Branch:         ${CI_COMMIT_REF_NAME}                     в•‘"
      echo "в•‘  Commit:         ${CI_COMMIT_SHORT_SHA}                    в•‘"
      echo "в•‘  Author:         ${GITLAB_USER_NAME}                       в•‘"
      echo "в•‘  Timestamp:      $(date -u +%Y-%m-%dT%H:%M:%SZ)           в•‘"
      echo "в•‘                                                            в•‘"
      echo "в• в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•Ј"
      echo "в•‘  COMMIT MESSAGE                                            в•‘"
      echo "в• в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•Ј"
      echo "в•‘  ${CI_COMMIT_TITLE}                                        в•‘"
      echo "в•‘                                                            в•‘"
      echo "в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ"

      echo ""
      echo "в”Ғв”Ғв”Ғ Environment Info в”Ғв”Ғв”Ғ"
      echo "  GitLab Runner:   ${CI_RUNNER_DESCRIPTION:-unknown}"
      echo "  Runner Tags:     ${CI_RUNNER_TAGS:-none}"
      echo "  Registry:        ${CI_REGISTRY}"
      echo "  Registry Image:  ${CI_REGISTRY_IMAGE}"
      echo ""
      echo "в”Ғв”Ғв”Ғ Service Change Detection в”Ғв”Ғв”Ғ"
      echo "  (Downstream jobs use rules:changes for granular triggering)"
      echo ""

      # List changed files for visibility
      if [ -n "${CI_MERGE_REQUEST_TARGET_BRANCH_SHA}" ]; then
        echo "  Changed files (MR diff):"
        git diff --name-only "${CI_MERGE_REQUEST_TARGET_BRANCH_SHA}...${CI_COMMIT_SHA}" 2>/dev/null | head -30 || echo "  (unable to compute diff)"
      else
        echo "  Changed files (last commit):"
        git diff --name-only HEAD~1 2>/dev/null | head -30 || echo "  (first commit or shallow clone)"
      fi

      echo ""
      echo "в”Ғв”Ғв”Ғ Pipeline stages: preflight вҶ’ security вҶ’ lint вҶ’ test вҶ’ build вҶ’ scan вҶ’ publish-chart вҶ’ deploy-staging вҶ’ integration-test вҶ’ deploy-production вҶ’ notify в”Ғв”Ғв”Ғ"
  rules:
    - when: always
  tags:
    - docker


global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
  - job_name: 'otel-collector-internal'
    static_configs:
      - targets: ['otel-collector:8888']
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Application services
  - job_name: 'checkout'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['checkout:8080']
        labels:
          service: checkout
  - job_name: 'catalog'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['catalog:8080']
        labels:
          service: catalog
  - job_name: 'cart'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['cart:8080']
        labels:
          service: cart
  - job_name: 'orders'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['orders:8080']
        labels:
          service: orders
  - job_name: 'ui'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ui:8080']
        labels:
          service: ui
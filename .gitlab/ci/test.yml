# =============================================================================
# TEST STAGE — Unit & Integration Testing
# =============================================================================
# Per-service test execution with coverage reports and JUnit XML artifacts.
# Each job extends the language-specific template from templates.yml.
#
# Test results are published to:
#   - GitLab MR widget (JUnit reports)
#   - Pipeline artifacts (coverage reports)
#   - Code coverage badge (via coverage regex)
# =============================================================================

# ---------------------------------------------------------------------------
# CART — Java/Spring Boot (Maven + JUnit 5 + JaCoCo)
# ---------------------------------------------------------------------------
test-cart:
  extends: .template-maven-test
  variables:
    SERVICE_NAME: cart
    SERVICE_DIR: src/cart
  coverage: '/Total.*?(\d+%)/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - src/cart/**/*
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - src/cart/**/*
    - if: $CI_COMMIT_TAG

# ---------------------------------------------------------------------------
# CATALOG — Go (go test + race detector + coverage)
# ---------------------------------------------------------------------------
test-catalog:
  extends: .template-go-test
  variables:
    SERVICE_NAME: catalog
    SERVICE_DIR: src/catalog
  coverage: '/^total:\s+\(statements\)\s+(\d+\.\d+)%/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - src/catalog/**/*
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - src/catalog/**/*
    - if: $CI_COMMIT_TAG

# ---------------------------------------------------------------------------
# CHECKOUT — Node.js/NestJS (Jest + coverage)
# ---------------------------------------------------------------------------
test-checkout:
  extends: .template-node-test
  variables:
    SERVICE_NAME: checkout
    SERVICE_DIR: src/checkout
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ---------------------------------------------------------------------------
# CATALOG INTEGRATION TESTS — Testcontainers (MySQL + full stack)
# ---------------------------------------------------------------------------
# The catalog service has testcontainers in go.mod — these tests spin up
# real MySQL containers for integration testing.
# Requires Docker socket access (DinD or Kaniko runner with Docker).
# ---------------------------------------------------------------------------
test-catalog-integration:
  stage: test
  image: golang:1.25-bookworm
  services:
    - docker:27-dind
  variables:
    GOPATH: "${CI_PROJECT_DIR}/.go"
    GOCACHE: "${CI_PROJECT_DIR}/.go-cache"
    GOPROXY: "https://proxy.golang.org,direct"
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_CERT_PATH: "/certs/client"
    DOCKER_TLS_VERIFY: "1"
    TESTCONTAINERS_RYUK_DISABLED: "true"
    CGO_ENABLED: "1"
  cache:
    key: "catalog-go-integration-${CI_COMMIT_REF_SLUG}"
    paths:
      - .go/pkg/mod/
      - .go-cache/
    policy: pull-push
  before_script:
    - cd "${CI_PROJECT_DIR}/src/catalog"
    - |
      # Install Docker CLI for testcontainers
      apt-get update -qq && apt-get install -y -qq docker.io > /dev/null 2>&1 || true
  script:
    - |
      echo "╔══════════════════════════════════════════════════╗"
      echo "║  CATALOG — Integration Tests (Testcontainers)    ║"
      echo "╚══════════════════════════════════════════════════╝"

      go test ./... \
        -v \
        -tags=integration \
        -count=1 \
        -timeout=300s \
        2>&1 | tee integration-test-output.txt
  artifacts:
    when: always
    paths:
      - src/catalog/integration-test-output.txt
    expire_in: 30 days
  allow_failure: true  # Integration tests may need Docker socket — allow failure
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - src/catalog/**/*
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - src/catalog/**/*
  tags:
    - docker

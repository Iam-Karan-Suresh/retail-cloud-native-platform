# ---------------------------------------------------------------------------
# BUILD ALL — Convenience job that triggers all builds
# ---------------------------------------------------------------------------
# Used when infrastructure changes affect all services (e.g., base image update)
# ---------------------------------------------------------------------------
build-all:
  stage: build
  image: alpine:3.22
  script:
    - echo "All service builds triggered"
  rules:
    - if: $CI_COMMIT_TAG
    - if: $FORCE_BUILD_ALL == "true"
  needs: []

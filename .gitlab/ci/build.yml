# =============================================================================
# BUILD STAGE — Kaniko Docker Build & Push + Container Scanning
# =============================================================================
# Builds Docker images for all 5 services using Kaniko (rootless).
# Images are pushed to GitLab Container Registry with multi-tag strategy.
# Each built image is then scanned by Trivy for vulnerabilities.
#
# Monorepo optimization: Only builds services whose source code changed.
# =============================================================================

# ---------------------------------------------------------------------------
# CART — Java/Spring Boot → eclipse-temurin
# ---------------------------------------------------------------------------
build-cart:
  extends: .template-docker-build
  variables:
    SERVICE_NAME: cart
    DOCKERFILE_PATH: src/cart/Dockerfile
    BUILD_CONTEXT: src/cart
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - src/cart/**/*
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - src/cart/**/*
  needs:
    - job: test-cart
      optional: true

scan-cart:
  extends: .template-container-scan
  variables:
    SERVICE_NAME: cart
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - src/cart/**/*
    - if: $CI_COMMIT_TAG
  needs:
    - job: build-cart


# Default values for ui.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
replicaCount: 1
image:
  repository: public.ecr.aws/aws-containers/retail-store-sample-ui
  pullPolicy: Always
  tags: "1.0.0"
imagePullSecrets:
  - name: regcred
nameOverride: ""
fullNameOverride: ""
serviceAccount:
  create: true
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullnam
  name: ""
podAnnotations: {}
podSecurityContext:
  fsGroup: 1000
securityContext:
  capabilities:
    drop:
      - ALL
    add:
     - NET_BIND_SERVICE
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
service:
  type: ClusterIP
  port: 80
  # annotations: {}
  # loadBalancerClass: ""
  # nodePort: 30000
resource:
  limits:
    memory: 512Mi
  requests:
    cpu: 128m
    memory: 512Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 50
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
metrics:
  enabled: true
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/actuator/prometheus"
configMap:
  create: true
  name: # if blank this will be generated
app:
  # theme: default
  endpoint:
    catalog: http://retail-store-catalog:80
    cart: http://retail-store-cart:80
    order: http://retail-store-order:80
    payment: http://retail-store-payment:80
  chat:
    enabled: false
    provider: ""
    model: ""
    # temperature: 0.7
    # maxTokens: 300
    # prompt: |
    #   This will override the default system prompt
    bedrock:
      region: ""
      openai: ""
      baseUrl: ""
        # apiKey: ""
## Ingress for NGINX Ingress Controller
        

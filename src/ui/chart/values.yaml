# =============================================================================
# SPOT-OPTIMIZED VALUES for UI Service
# =============================================================================
# UI is a stateless Java/Spring Boot frontend. It renders pages and proxies
# API calls to backend services. It holds ZERO local state.
# PERFECT candidate for spot instances.
#
# This is the user-facing service — we run MORE replicas (4) with
# topology spread to guarantee zero-downtime even during spot reclaims.
# =============================================================================

# Default values for ui.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 4
image:
  repository: public.ecr.aws/aws-containers/retail-store-sample-ui
  pullPolicy: Always
  tag: "1.2.2"
imagePullSecrets:
  - name: regcred
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""
podAnnotations: {}
podSecurityContext:
  fsGroup: 1000
securityContext:
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
service:
  type: ClusterIP
  port: 80
  # annotations: {}
  # loadBalancerClass: ""
  # nodePort: 30000
resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 128m
    memory: 512Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 50

# ---------------------------------------------------------------------------
# SPOT INSTANCE SCHEDULING
# UI is the most visible service — but it's stateless, so spot is safe.
# With 4 replicas spread across AZs, users won't notice a spot reclaim.
# ---------------------------------------------------------------------------
nodeSelector:
  role: spot-worker

tolerations: []

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: "node.kubernetes.io/lifecycle"
              operator: In
              values: ["spot"]

# ---------------------------------------------------------------------------
# TOPOLOGY SPREAD — spread across zones AND nodes
# User-facing service needs maximum fault isolation
# ---------------------------------------------------------------------------
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: retail-store-sample-ui-chart
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: retail-store-sample-ui-chart

metrics:
  enabled: true
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/actuator/prometheus"
configMap:
  create: true
  name: # if blank this will be generated
app:
  # theme: default
  endpoints:
    catalog: http://retail-store-catalog:80
    carts: http://retail-store-cart-carts:80
    orders: http://retail-store-orders:80
    checkout: http://retail-store-checkout:80
  chat:
    enabled: false
    provider: ""
    model: ""
    # temperature: 0.7
    # maxTokens: 300
    # prompt: |
    #   This will override the default system prompt
    bedrock:
      region: ""
    openai:
      baseUrl: ""
      # apiKey: ""
## Ingress for NGINX Ingress Controller
ingress:
  enabled: false
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
  tls: []
  hosts: []
ingresses:
  # Direct ELB access - no host restriction
  - name: direct
    className: "nginx"
    hosts: []
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
      nginx.ingress.kubernetes.io/proxy-body-size: "8m"
      nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    tls: []
  # Domain-based access with SSL
  - name: domain
    className: "nginx"
    hosts:
      - retail-store.trainwithshubham.com
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/proxy-body-size: "8m"
      nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    tls:
      - secretName: tls-secret
        hosts:
          - retail-store.trainwithshubham.com

# Cert Manager Configuration
certManager:
  createClusterIssuer: true
  email: trainwithshubham@gmail.com
  clusterIssuerName: "letsencrypt-prod"
  server: "https://acme-v02.api.letsencrypt.org/directory"
  privateKeySecretName: "letsencrypt-prod-key"
istio:
  enabled: false
  hosts: []
opentelemetry:
  enabled: false
  instrumentation: ""

# ---------------------------------------------------------------------------
# POD DISRUPTION BUDGET — stricter for user-facing service
# With 4 replicas, keep 3 running at all times → only 1 eviction at a time
# ---------------------------------------------------------------------------
podDisruptionBudget:
  enabled: true
  minAvailable: 3
  maxUnavailable: 1

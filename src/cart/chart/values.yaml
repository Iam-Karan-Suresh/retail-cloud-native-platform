# =============================================================================
# SPOT-OPTIMIZED VALUES for Cart Service
# =============================================================================
# Cart is a stateless Java/Spring Boot API. It stores cart data in DynamoDB
# (managed by AWS) or in-memory. The service itself holds ZERO local state.
# PERFECT candidate for spot instances.
# =============================================================================

# Default values for carts.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 3
image:
  repository: ghcr.io/iam-karan-suresh/retail-store-sample-cart
  pullPolicy: Always
  tag: "1.3.0"
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""
podAnnotations: {}
podSecurityContext:
  fsGroup: 1000
securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
service:
  type: ClusterIP
  port: 80
resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 256m
    memory: 512Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# ---------------------------------------------------------------------------
# SPOT INSTANCE SCHEDULING
# Prefer spot-worker nodes, fall back to on-demand if spot is unavailable
# ---------------------------------------------------------------------------
nodeSelector:
  role: spot-worker

tolerations: []

affinity:
  # Prefer spot instances (soft rule — won't block scheduling)
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: "node.kubernetes.io/lifecycle"
              operator: In
              values: ["spot"]

# ---------------------------------------------------------------------------
# TOPOLOGY SPREAD — survive AZ-level spot reclaims
# With 3 replicas across 3 AZs, a spot reclaim takes out only 1 pod
# ---------------------------------------------------------------------------
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: retail-store-sample-cart-chart

metrics:
  enabled: true
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/actuator/prometheus"
configMap:
  create: true
  name:
app:
  persistence:
    provider: in-memory
    dynamodb:
      tableName: Items
      createTable: false
dynamodb:
  create: false
  image:
    repository: public.ecr.aws/aws-dynamodb-local/aws-dynamodb-local
    pullPolicy: IfNotPresent
    tag: "3.0.0"
  service:
    type: ClusterIP
    port: 8000
  podAnnotations: {}
  # DynamoDB Local (if used) → On-Demand system nodes
  nodeSelector:
    role: system
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
      effect: NoSchedule
  affinity: {}

opentelemetry:
  enabled: true
  instrumentation: ""
  env:
    OTEL_SERVICE_NAME: cart
    OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4318
    OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    OTEL_PROPAGATORS: tracecontext,baggage
    OTEL_TRACES_SAMPLER: always_on
    OTEL_LOGS_EXPORTER: otlp

# POD DISRUPTION BUDGET
podDisruptionBudget:
  enabled: true
  minAvailable: 2
  maxUnavailable: 1

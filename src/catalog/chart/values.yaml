# =============================================================================
# SPOT-OPTIMIZED VALUES for Catalog Service
# =============================================================================
# Catalog is a stateless Go API. It reads product data from MySQL or in-memory.
# The service itself holds ZERO local state — pure read-heavy API.
# PERFECT candidate for spot instances.
#
# MySQL (stateful backing store) → pinned to On-Demand system nodes.
# =============================================================================

# Default values for catalog.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 3
image:
  repository: ghcr.io/iam-karan-suresh/retail-store-sample-catalog
  pullPolicy: Always
  tag: '1.3.0'
imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ''
podAnnotations: {}
podSecurityContext:
  fsGroup: 1000
securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
service:
  type: ClusterIP
  port: 80
resources:
  limits:
    memory: 256Mi
  requests:
    cpu: 256m
    memory: 256Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# ---------------------------------------------------------------------------
# SPOT INSTANCE SCHEDULING
# ---------------------------------------------------------------------------
nodeSelector:
  role: spot-worker

tolerations: []

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: 'node.kubernetes.io/lifecycle'
              operator: In
              values: ['spot']

# ---------------------------------------------------------------------------
# TOPOLOGY SPREAD
# ---------------------------------------------------------------------------
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: retail-store-sample-catalog-chart

metrics:
  enabled: true
  podAnnotations:
    prometheus.io/scrape: 'true'
    prometheus.io/port: '8080'
    prometheus.io/path: '/metrics'
configMap:
  create: true
  name:
app:
  persistence:
    provider: in-memory
    endpoint: ''
    database: 'catalog'
    secret:
      create: true
      name: catalog-db
      username: catalog
      password: ''

# ---------------------------------------------------------------------------
# MYSQL (STATEFUL) → On-Demand system nodes ONLY
# Databases must NEVER run on spot instances — data loss guaranteed.
# ---------------------------------------------------------------------------
mysql:
  create: false
  image:
    repository: public.ecr.aws/docker/library/mysql
    pullPolicy: IfNotPresent
    tag: '8.4'
  service:
    type: ClusterIP
    port: 3306
  podAnnotations: {}
  # Pin MySQL to On-Demand system nodes
  nodeSelector:
    role: system
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
      effect: NoSchedule
  affinity: {}
  persistentVolume:
    enabled: false
    annotations: {}
    labels: {}
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    storageClass: ''
securityGroups:
  create: false
  securityGroupIds: []

opentelemetry:
  enabled: true
  instrumentation: ''
  env:
    OTEL_SERVICE_NAME: catalog
    OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4318
    OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    OTEL_PROPAGATORS: tracecontext,baggage
    OTEL_TRACES_SAMPLER: always_on
    OTEL_LOGS_EXPORTER: otlp

# POD DISRUPTION BUDGET
# ---------------------------------------------------------------------------
podDisruptionBudget:
  enabled: true
  minAvailable: 2
  maxUnavailable: 1

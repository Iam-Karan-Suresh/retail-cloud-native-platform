# =============================================================================
# SPOT-OPTIMIZED VALUES for Orders Service
# =============================================================================
# Orders is a stateless Java/Spring Boot API. It uses PostgreSQL for
# persistence and RabbitMQ for async messaging. The service itself holds
# ZERO local state — it's a pure API layer over the database.
# PERFECT candidate for spot instances.
#
# PostgreSQL (stateful database) → On-Demand system nodes.
# RabbitMQ (stateful message broker) → On-Demand system nodes.
# =============================================================================

# Default values for orders.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 3
image:
  repository: ghcr.io/iam-karan-suresh/retail-store-sample-orders
  pullPolicy: Always
  tag: '1.3.0'
imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ''
podAnnotations: {}
podSecurityContext:
  fsGroup: 1000
securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
service:
  type: ClusterIP
  port: 80
resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 256m
    memory: 512Mi
# ---------------------------------------------------------------------------
# LEGACY HPA AUTOSCALING (DISABLED — replaced by KEDA below)
# HPA scales on CPU/memory which are LAGGING indicators.
# ---------------------------------------------------------------------------
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# =============================================================================
# KEDA — Event-Driven Autoscaling for RabbitMQ
# =============================================================================
# KEDA replaces HPA with queue-depth-driven scaling:
#   - Scales on RabbitMQ queue depth (LEADING indicator)
#   - Provisions pods BEFORE CPU spikes, not after
#   - Can scale to zero when queue is empty → cost savings
#   - Supports cooldown periods to prevent thrashing
#   - Native RabbitMQ protocol support (no custom metrics adapter)
# =============================================================================
keda:
  enabled: true
  minReplicaCount: 2
  maxReplicaCount: 15
  cooldownPeriod: 60 # seconds before scaling down
  pollingInterval: 10 # seconds between queue depth checks
  # idleReplicaCount: 0       # uncomment for scale-to-zero
  restoreToOriginalReplicaCount: false
  # Scale-up behavior — aggressive (react fast to order surges)
  scaleUp:
    stabilizationWindowSeconds: 30
    maxPodsPerInterval: 3
    periodSeconds: 30
  # Scale-down behavior — conservative (avoid premature scale-down)
  scaleDown:
    stabilizationWindowSeconds: 120
    maxPodsPerInterval: 1
    periodSeconds: 60
  # RabbitMQ trigger configuration
  rabbitmq:
    queueName: 'orders'
    host: 'amqp://guest:guest@retail-store-orders-rabbitmq:5672/'
    queueLength: '5' # scale up when >5 messages per replica
    protocol: 'amqp'
    mode: 'QueueLength'
    # authenticationRef: ""   # set if using TriggerAuthentication
    triggerAuthentication:
      enabled: false
      secretName: 'orders-rabbitmq-keda'
      secretKey: 'host'
  # Fallback CPU trigger — safety net if RabbitMQ metrics unavailable
  fallbackCPUTrigger:
    enabled: true
    targetUtilization: '70'

# ---------------------------------------------------------------------------
# SPOT INSTANCE SCHEDULING
# ---------------------------------------------------------------------------
nodeSelector:
  role: spot-worker

tolerations: []

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: 'node.kubernetes.io/lifecycle'
              operator: In
              values: ['spot']

# ---------------------------------------------------------------------------
# TOPOLOGY SPREAD
# ---------------------------------------------------------------------------
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: retail-store-sample-orders-chart

metrics:
  enabled: true
  podAnnotations:
    prometheus.io/scrape: 'true'
    prometheus.io/port: '8080'
    prometheus.io/path: '/actuator/prometheus'
configMap:
  create: true
  name:
app:
  persistence:
    provider: 'in-memory'
    endpoint: ''
    database: 'orders'
    secret:
      create: true
      name: orders-db
      username: orders
      password: ''
  messaging:
    provider: 'in-memory'
    rabbitmq:
      addresses: []
      secret:
        create: true
        name: orders-rabbitmq
        username: ''
        password: ''

# ---------------------------------------------------------------------------
# POSTGRESQL (STATEFUL DATABASE) → On-Demand system nodes ONLY
# Losing a PostgreSQL instance on spot = data loss + corruption.
# ---------------------------------------------------------------------------
postgresql:
  create: false
  image:
    repository: public.ecr.aws/docker/library/postgres
    pullPolicy: IfNotPresent
    tag: '16'
  service:
    type: ClusterIP
    port: 5432
  podAnnotations: {}
  # Pin PostgreSQL to On-Demand system nodes
  nodeSelector:
    role: system
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
      effect: NoSchedule
  affinity: {}
  persistentVolume:
    enabled: false
    annotations: {}
    labels: {}
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    # storageClass: gp2

# ---------------------------------------------------------------------------
# RABBITMQ (STATEFUL MESSAGE BROKER) → On-Demand system nodes ONLY
# RabbitMQ stores unacknowledged messages on disk. Spot reclaim = message loss.
# ---------------------------------------------------------------------------
rabbitmq:
  create: false
  image:
    repository: public.ecr.aws/docker/library/rabbitmq
    pullPolicy: IfNotPresent
    tag: '4.2-management'
  service:
    type: ClusterIP
    amqp:
      port: 5672
    http:
      port: 15672
  podAnnotations: {}
  # Pin RabbitMQ to On-Demand system nodes
  nodeSelector:
    role: system
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
      effect: NoSchedule
  affinity: {}
  persistentVolume:
    enabled: false
    annotations: {}
    labels: {}
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    # storageClass: gp2
securityGroups:
  create: false
  securityGroupIds: []

opentelemetry:
  enabled: true
  instrumentation: ''
  env:
    OTEL_SERVICE_NAME: orders
    OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4318
    OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    OTEL_PROPAGATORS: tracecontext,baggage
    OTEL_TRACES_SAMPLER: always_on
    OTEL_LOGS_EXPORTER: otlp
# POD DISRUPTION BUDGET
podDisruptionBudget:
  enabled: true
  minAvailable: 2
  maxUnavailable: 1
